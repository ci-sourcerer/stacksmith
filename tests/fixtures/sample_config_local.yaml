backend:
  type: local
  path: "/tmp/stacksmith-state"


tofu:
  version: "1.8.0"

provider_mappings:
  aws:
    source: "hashicorp/aws"
    version: "~> 5.0"
    instances:
      default:
        config:
          data:
            region: "us-east-1"

module_mappings:
  aws_s3_bucket:
    source: "https://github.com/org/terraform-aws-s3.git"
    version: "1.0.0"
    properties:
      acl:
        mapped_to: bucket_acl
  aws_ec2_instance:
    source: "https://github.com/org/terraform-aws-ec2.git"
    version: "2.0.0"
