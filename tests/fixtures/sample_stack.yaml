name: my-stack

tags:
  - networking
  - storage

mock_outputs:
  vpc_id: "mock-vpc-123"
  subnet_ids:
    - "mock-subnet-a"
    - "mock-subnet-b"

components:
  my-bucket:
    type: aws_s3_bucket
    properties:
      acl: private
      bucket: "{{ inputs.bucket_name }}"
  my-instance:
    type: aws_ec2_instance
    properties:
      ami: ami-12345678
      instance_type: t2.micro
