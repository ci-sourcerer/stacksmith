name: stacksmith-gitops-opinionated-reusable

on:
  workflow_call:
    inputs:
      operation:
        description: Plan or apply operation.
        required: true
        type: string
      environments:
        description: Comma-separated environment names. Leave empty for automatic selection.
        required: false
        type: string
        default: ""
      gitops_root:
        description: Relative path to the GitOps root folder.
        required: false
        type: string
        default: .
      workdir:
        description: Working directory to run Stacksmith from.
        required: false
        type: string
        default: .
      env_file:
        description: Env file path to pass to Stacksmith.
        required: false
        type: string
        default: /dev/null
      image_version:
        description: Tag for the Stacksmith container image.
        required: false
        type: string
        default: latest
      plan_args:
        description: Extra CLI args appended to Stacksmith plan.
        required: false
        type: string
        default: ""
      apply_args:
        description: Extra CLI args appended to Stacksmith apply.
        required: false
        type: string
        default: ""
      validation_report_format:
        description: Validation report format for plan output.
        required: false
        type: string
        default: json
      dockerhub_username:
        description: Docker Hub username for container image pulls.
        required: false
        type: string
        default: ""
      upload_artifacts:
        description: Upload plan artifacts when operation is plan.
        required: false
        type: boolean
        default: true
      caller_event_name:
        description: Caller workflow event name.
        required: false
        type: string
        default: ""
      caller_base_ref:
        description: Caller base ref for pull_request events.
        required: false
        type: string
        default: ""
      caller_event_before:
        description: Caller before SHA for push events.
        required: false
        type: string
        default: ""
      caller_sha:
        description: Caller SHA.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  discover:
    name: discover-environments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      count: ${{ steps.select.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select target environments
        id: select
        env:
          INPUT_ENVIRONMENTS: ${{ inputs.environments }}
          INPUT_GITOPS_ROOT: ${{ inputs.gitops_root }}
          CALLER_EVENT_NAME: ${{ inputs.caller_event_name || github.event_name }}
          CALLER_BASE_REF: ${{ inputs.caller_base_ref || github.base_ref }}
          CALLER_EVENT_BEFORE: ${{ inputs.caller_event_before || github.event.before }}
          CALLER_SHA: ${{ inputs.caller_sha || github.sha }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          gitops_root = os.getenv("INPUT_GITOPS_ROOT", "").strip() or "."
          if gitops_root.startswith("./"):
              gitops_root = gitops_root[2:]
          if gitops_root in {"", "."}:
              gitops_root = ""
          else:
              gitops_root = gitops_root.strip("/")

          if gitops_root:
              env_root = pathlib.Path(gitops_root) / "environments"
              env_prefix = f"{gitops_root}/environments/"
              common_prefixes = (
                  f"{gitops_root}/common/",
                  f"{gitops_root}/manifests/common/",
              )
              run_file_prefix = f"{gitops_root}/environments"
          else:
              env_root = pathlib.Path("environments")
              env_prefix = "environments/"
              common_prefixes = (
                  "common/",
                  "manifests/common/",
              )
              run_file_prefix = "environments"

          all_envs = []
          if env_root.exists():
              for env_dir in sorted(env_root.iterdir()):
                  if (env_dir / "stacksmith.yaml").exists():
                      all_envs.append(env_dir.name)

          manual = os.getenv("INPUT_ENVIRONMENTS", "").strip()
          selected = set()

          if manual:
              selected = {item.strip() for item in manual.split(",") if item.strip()}
          else:
              event_name = os.getenv("CALLER_EVENT_NAME", "")
              if event_name == "workflow_dispatch":
                  selected = set(all_envs)
              elif event_name == "pull_request":
                  base_ref = os.getenv("CALLER_BASE_REF", "")
                  if base_ref:
                      subprocess.run(
                          ["git", "fetch", "origin", base_ref, "--depth", "1"],
                          check=True,
                      )
                      diff_text = subprocess.check_output(
                          ["git", "diff", "--name-only", f"origin/{base_ref}...HEAD"],
                          text=True,
                      )
                  else:
                      diff_text = ""
              elif event_name == "push":
                  before = os.getenv("CALLER_EVENT_BEFORE", "")
                  after = os.getenv("CALLER_SHA", "")
                  if before and before != "0000000000000000000000000000000000000000" and after:
                      diff_text = subprocess.check_output(
                          ["git", "diff", "--name-only", before, after],
                          text=True,
                      )
                  else:
                      diff_text = ""
              else:
                  diff_text = ""

              if not manual and event_name in {"pull_request", "push"}:
                  changed_paths = [line.strip() for line in diff_text.splitlines() if line.strip()]
                  if not changed_paths:
                      selected = set(all_envs)
                  else:
                      run_all = any(path.startswith(common_prefixes) for path in changed_paths) or any(
                          path.startswith(".github/workflows/") for path in changed_paths
                      )
                      if run_all:
                          selected = set(all_envs)
                      else:
                          for path in changed_paths:
                              if not path.startswith(env_prefix):
                                  continue
                              rel_path = pathlib.Path(path[len(env_prefix):])
                              if rel_path.parts:
                                  selected.add(rel_path.parts[0])

          selected = [env for env in all_envs if env in selected]
          matrix = [
              {
                  "environment": env,
                  "run_file": f"{run_file_prefix}/{env}/stacksmith.yaml",
              }
              for env in selected
          ]

          output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps(matrix)}\\n")
              handle.write(f"count={len(matrix)}\\n")
          PY

  plan:
    name: plan
    needs: discover
    if: ${{ inputs.operation == 'plan' && needs.discover.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/stacksmith-gitops-reusable.yml
    with:
      operation: plan
      environment: ${{ matrix.environment }}
      run_file: ${{ matrix.run_file }}
      workdir: ${{ inputs.workdir }}
      env_file: ${{ inputs.env_file }}
      stacksmith_args: ${{ inputs.plan_args }}
      image_version: ${{ inputs.image_version }}
      dockerhub_username: ${{ inputs.dockerhub_username }}
      validation_report_format: ${{ inputs.validation_report_format }}
      upload_artifacts: ${{ inputs.upload_artifacts }}
    secrets: inherit

  apply:
    name: apply
    needs: discover
    if: ${{ inputs.operation == 'apply' && needs.discover.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/stacksmith-gitops-reusable.yml
    with:
      operation: apply
      environment: ${{ matrix.environment }}
      run_file: ${{ matrix.run_file }}
      workdir: ${{ inputs.workdir }}
      env_file: ${{ inputs.env_file }}
      stacksmith_args: ${{ inputs.apply_args }}
      image_version: ${{ inputs.image_version }}
      dockerhub_username: ${{ inputs.dockerhub_username }}
    secrets: inherit

  no-op:
    name: no-op
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ needs.discover.outputs.count == '0' }}
    steps:
      - name: Summary
        run: |
          {
              echo "## Stacksmith ${INPUT_OPERATION}"
              echo ""
              echo "No environment manifests were selected for this event."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          INPUT_OPERATION: ${{ inputs.operation }}
