name: stacksmith-gitops-opinionated-reusable

on:
  workflow_call:
    inputs:
      operation:
        description: Plan or apply operation.
        required: true
        type: string
      environments:
        description: Comma-separated environment names. Leave empty for automatic selection.
        required: false
        type: string
        default: ""
      discovery_mode:
        description: "Discovery mode. Supported values: folders (default), flat-files, or env-files."
        required: false
        type: string
        default: folders
      gitops_root:
        description: Relative path to the GitOps root folder.
        required: false
        type: string
        default: .
      workdir:
        description: Working directory to run Stacksmith from.
        required: false
        type: string
        default: .
      env_file:
        description: Env file path to pass to Stacksmith.
        required: false
        type: string
        default: /dev/null
      image_version:
        description: Tag for the Stacksmith container image.
        required: false
        type: string
        default: latest
      plan_args:
        description: Extra CLI args appended to Stacksmith plan.
        required: false
        type: string
        default: ""
      apply_args:
        description: Extra CLI args appended to Stacksmith apply.
        required: false
        type: string
        default: ""
      validation_report_format:
        description: Validation report format for plan output.
        required: false
        type: string
        default: json
      dockerhub_username:
        description: Docker Hub username for container image pulls.
        required: false
        type: string
        default: ""
      upload_artifacts:
        description: Upload plan artifacts when operation is plan.
        required: false
        type: boolean
        default: true
      caller_event_name:
        description: Caller workflow event name.
        required: false
        type: string
        default: ""
      caller_base_ref:
        description: Caller base ref for pull_request events.
        required: false
        type: string
        default: ""
      caller_event_before:
        description: Caller before SHA for push events.
        required: false
        type: string
        default: ""
      caller_sha:
        description: Caller SHA.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  discover:
    name: discover-environments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      count: ${{ steps.select.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select target environments
        id: select
        env:
          INPUT_ENVIRONMENTS: ${{ inputs.environments }}
          INPUT_DISCOVERY_MODE: ${{ inputs.discovery_mode }}
          INPUT_GITOPS_ROOT: ${{ inputs.gitops_root }}
          CALLER_EVENT_NAME: ${{ inputs.caller_event_name || github.event_name }}
          CALLER_BASE_REF: ${{ inputs.caller_base_ref || github.base_ref }}
          CALLER_EVENT_BEFORE: ${{ inputs.caller_event_before || github.event.before }}
          CALLER_SHA: ${{ inputs.caller_sha || github.sha }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys

          COMMON_CANDIDATES = (
              "common/stacksmith.yaml",
              "common/stacksmith.common.yaml",
              "common/stacksmith.shared.yaml",
              "common/stacksmith.base.yaml",
              "common/stacksmith.defaults.yaml",
              "stacksmith.yaml",
              "stacksmith.common.yaml",
              "stacksmith.shared.yaml",
              "stacksmith.base.yaml",
              "stacksmith.defaults.yaml",
          )

          def normalize_gitops_root(value: str) -> str:
              value = value.strip() or "."
              if value.startswith("./"):
                  value = value[2:]
              return "" if value in {"", "."} else value.strip("/")

          def project_root(prefix: str) -> pathlib.Path:
              return pathlib.Path(prefix or ".")

          def normalize_discovery_mode(value: str) -> str:
              mode = value.strip().lower() or "folders"
              return "env-files" if mode in {"env", "env-files"} else mode

          def common_run_file_for(root: pathlib.Path) -> str:
              return next(
                  (str((root / candidate).as_posix()) for candidate in COMMON_CANDIDATES if (root / candidate).exists()),
                  str((root / "common/stacksmith.yaml").as_posix()),
              )

          def discover_envs(mode: str, root: pathlib.Path) -> tuple[list[str], str]:
              all_envs = []
              env_root = root / "environments"

              if mode == "flat-files":
                  common_file = common_run_file_for(root)
                  for path in sorted(root.glob("stacksmith.*.yaml")) + sorted(root.glob("stacksmith.*.yml")) + sorted(root.glob("stacksmith.*.json")):
                      name = path.stem.replace("stacksmith.", "", 1)
                      if name in {"yaml", "yml", "json", "common", "shared", "base", "defaults"}:
                          continue
                      all_envs.append(name)
                  return all_envs, common_file

              if mode == "env-files":
                  common_file = common_run_file_for(root)
                  if env_root.exists():
                      for path in sorted(env_root.glob("*.yaml")) + sorted(env_root.glob("*.yml")) + sorted(env_root.glob("*.json")):
                          if path.is_file() and path.stem not in {"stacksmith", "common", "shared", "base", "defaults"}:
                              all_envs.append(path.stem)
                  return all_envs, common_file

              if env_root.exists():
                  for env_dir in sorted(env_root.iterdir()):
                      if env_dir.is_dir():
                          all_envs.append(env_dir.name)

              return all_envs, "common/stacksmith.yaml"

          def changed_paths_for_event(event_name: str) -> list[str]:
              if event_name == "pull_request":
                  base_ref = os.getenv("CALLER_BASE_REF", "")
                  if base_ref:
                      subprocess.run(["git", "fetch", "origin", base_ref, "--depth", "1"], check=True)
                      return [line.strip() for line in subprocess.check_output(["git", "diff", "--name-only", f"origin/{base_ref}...HEAD"], text=True).splitlines() if line.strip()]
                  return []

              if event_name == "push":
                  before = os.getenv("CALLER_EVENT_BEFORE", "")
                  after = os.getenv("CALLER_SHA", "")
                  if before and before != "0000000000000000000000000000000000000000" and after:
                      return [line.strip() for line in subprocess.check_output(["git", "diff", "--name-only", before, after], text=True).splitlines() if line.strip()]

              return []

          def select_changed_envs(changed_paths: list[str], mode: str, prefix: str, common_prefixes: tuple[str, ...], all_envs: list[str]) -> set[str]:
              selected = set()
              run_all = any(path.startswith(common_prefixes) for path in changed_paths) or any(path.startswith(".github/workflows/") for path in changed_paths)
              if run_all:
                  return set(all_envs)

              env_prefix = f"{prefix}environments/"
              for path in changed_paths:
                  candidate = path[len(prefix):] if path.startswith(prefix) else path
                  if mode == "flat-files":
                      if not candidate.startswith("stacksmith.") or not candidate.endswith((".yaml", ".yml", ".json")):
                          continue
                      env_name = candidate.removeprefix("stacksmith.").rsplit(".", 1)[0]
                  elif mode == "env-files":
                      if not candidate.startswith("environments/"):
                          continue
                      env_name = pathlib.Path(candidate).stem
                  else:
                      if not candidate.startswith("environments/"):
                          continue
                      rel_path = pathlib.Path(candidate[len("environments/"):])
                      if rel_path.parts:
                          selected.add(rel_path.parts[0])
                      continue

                  if env_name not in {"common", "shared", "base", "defaults"}:
                      selected.add(env_name)

              return selected

          gitops_root = normalize_gitops_root(os.getenv("INPUT_GITOPS_ROOT", ""))
          prefix = f"{gitops_root}/" if gitops_root else ""
          root = project_root(prefix)
          discovery_mode = normalize_discovery_mode(os.getenv("INPUT_DISCOVERY_MODE", "folders"))
          common_prefixes = (f"{prefix}common/", f"{prefix}manifests/common/")

          all_envs, common_run_file = discover_envs(discovery_mode, root)
          manual = os.getenv("INPUT_ENVIRONMENTS", "").strip()
          selected = {item.strip() for item in manual.split(",") if item.strip()} if manual else set()

          if not manual and not all_envs:
              print(
                  "No environments were discovered under 'environments/'. "
                  "Also, no environments were manually specified via the "
                  "'environments' input or INPUT_ENVIRONMENTS environment variable.",
                  file=sys.stderr,
              )
              sys.exit(1)

          if not manual:
              event_name = os.getenv("CALLER_EVENT_NAME", "")
              if event_name == "workflow_dispatch":
                  selected = set(all_envs)
              elif event_name in {"pull_request", "push"}:
                  changed_paths = changed_paths_for_event(event_name)
                  selected = set(all_envs) if not changed_paths else select_changed_envs(changed_paths, discovery_mode, prefix, common_prefixes, all_envs)
              else:
                  selected = set(all_envs)

          if not selected:
              selected = set(all_envs)

          if manual:
              matrix_envs = sorted(selected)
          else:
              matrix_envs = sorted(env for env in selected if env in all_envs)

          matrix = [
              {
                  "environment": env,
                  "runfile": common_run_file,
              }
              for env in matrix_envs
          ]

          output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps(matrix)}\n")
              handle.write(f"count={len(matrix)}\n")
          PY

  plan:
    name: plan
    needs: discover
    if: ${{ inputs.operation == 'plan' && needs.discover.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/stacksmith-gitops-reusable.yml
    with:
      operation: plan
      environment: ${{ matrix.environment }}
      runfile: ${{ matrix.runfile }}
      workdir: ${{ inputs.workdir }}
      env_file: ${{ inputs.env_file }}
      stacksmith_args: >-
        ${{ inputs.plan_args }}
        --var environment=${{ matrix.environment }}
      image_version: ${{ inputs.image_version }}
      dockerhub_username: ${{ inputs.dockerhub_username }}
      validation_report_format: ${{ inputs.validation_report_format }}
      upload_artifacts: ${{ inputs.upload_artifacts }}
    secrets: inherit

  apply:
    name: apply
    needs: discover
    if: ${{ inputs.operation == 'apply' && needs.discover.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/stacksmith-gitops-reusable.yml
    with:
      operation: apply
      environment: ${{ matrix.environment }}
      runfile: ${{ matrix.runfile }}
      workdir: ${{ inputs.workdir }}
      env_file: ${{ inputs.env_file }}
      stacksmith_args: >-
        ${{ inputs.apply_args }}
        --var environment=${{ matrix.environment }}
      image_version: ${{ inputs.image_version }}
      dockerhub_username: ${{ inputs.dockerhub_username }}
    secrets: inherit

  no-op:
    name: no-op
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ needs.discover.outputs.count == '0' }}
    steps:
      - name: Summary
        run: |
          {
              echo "## Stacksmith ${INPUT_OPERATION}"
              echo ""
              echo "No environment manifests were selected for this event."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          INPUT_OPERATION: ${{ inputs.operation }}
