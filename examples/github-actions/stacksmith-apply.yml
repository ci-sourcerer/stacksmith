name: stacksmith-apply

on:
  push:
    branches:
      - main
    paths:
      - "**/stacksmith.yaml"
      - "**/stacksmith.*.yaml"
      - "**/stacksmith.*.yml"
      - "**/stacksmith.*.json"
      - "**/*.stack.yaml"
      - "**/*.stack.yml"
      - "**/environments/*.yaml"
      - "**/environments/*.yml"
      - "**/environments/*.json"
      - "**/manifests/common/**"
      - "**/manifests/environments/**"
      - .github/workflows/stacksmith-plan.yml
      - .github/workflows/stacksmith-apply.yml
  workflow_dispatch:
    inputs:
      environments:
        description: Comma-separated environment names. Leave empty for automatic selection.
        required: false
        type: string
      gitops_root:
        description: Relative path to the GitOps root folder.
        required: false
        type: string
      discovery_mode:
        description: "Discovery mode. Supported values: folders (default), flat-files, or env-files."
        required: false
        type: string

permissions:
  contents: read

jobs:
  apply:
    uses: ci-sourcerer/stacksmith/.github/workflows/stacksmith-gitops-opinionated-reusable.yml@main
    with:
      operation: apply
      environments: ${{ github.event.inputs.environments || '' }}
      gitops_root: ${{ github.event.inputs.gitops_root || vars.STACKSMITH_GITOPS_ROOT || '.' }}
      discovery_mode: ${{ github.event.inputs.discovery_mode || vars.STACKSMITH_DISCOVERY_MODE || 'folders' }}
      workdir: ${{ vars.STACKSMITH_WORKDIR || '.' }}
    secrets: inherit
