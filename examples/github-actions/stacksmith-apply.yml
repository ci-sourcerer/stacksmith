name: stacksmith-apply

env:
  STACKSMITH_GITOPS_ROOT: ${{ vars.STACKSMITH_GITOPS_ROOT || '.' }}
  STACKSMITH_WORKDIR: ${{ vars.STACKSMITH_WORKDIR || '.' }}
  STACKSMITH_ENV_FILE: ${{ vars.STACKSMITH_ENV_FILE || '/dev/null' }}
  STACKSMITH_IMAGE_VERSION: ${{ vars.STACKSMITH_IMAGE_VERSION || 'latest' }}
  STACKSMITH_APPLY_ARGS: ${{ vars.STACKSMITH_APPLY_ARGS || '' }}

on:
  push:
    branches:
      - main
    paths:
      - "**/stacksmith.yaml"
      - "**/*.stack.yaml"
      - .github/workflows/stacksmith-plan.yml
      - .github/workflows/stacksmith-apply.yml
  workflow_dispatch:
    inputs:
      environments:
        description: Comma-separated environment names. Leave empty for automatic selection.
        required: false
        type: string
      gitops_root:
        description: Relative path to the GitOps root folder.
        required: false
        type: string

permissions:
  contents: read

jobs:
  apply:
    uses: cisourcerer/stacksmith/.github/workflows/stacksmith-gitops-opinionated-reusable.yml@main
    with:
      operation: apply
      environments: ${{ github.event.inputs.environments || '' }}
      gitops_root: ${{ github.event.inputs.gitops_root || env.STACKSMITH_GITOPS_ROOT }}
      workdir: ${{ env.STACKSMITH_WORKDIR }}
      env_file: ${{ env.STACKSMITH_ENV_FILE }}
      image_version: ${{ env.STACKSMITH_IMAGE_VERSION }}
      apply_args: ${{ env.STACKSMITH_APPLY_ARGS }}
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME || '' }}
      caller_event_name: ${{ github.event_name }}
      caller_event_before: ${{ github.event.before || '' }}
      caller_sha: ${{ github.sha }}
    secrets: inherit
