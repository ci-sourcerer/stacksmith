name: stacksmith-plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/stacksmith.yaml"
      - "**/*.stack.yaml"
      - .github/workflows/stacksmith-plan.yml
      - .github/workflows/stacksmith-apply.yml
  push:
    branches:
      - main
    paths:
      - "**/stacksmith.yaml"
      - "**/*.stack.yaml"
      - .github/workflows/stacksmith-plan.yml
      - .github/workflows/stacksmith-apply.yml
  workflow_dispatch:
    inputs:
      environments:
        description: Comma-separated environment names. Leave empty for automatic selection.
        required: false
        type: string
      gitops_root:
        description: Relative path to the GitOps root folder.
        required: false
        type: string
      discovery_mode:
        description: "Discovery mode. Supported values: folders (default) or flat-files."
        required: false
        type: string

permissions:
  contents: read

jobs:
  plan:
    uses: ci-sourcerer/stacksmith/.github/workflows/stacksmith-gitops-opinionated-reusable.yml@main
    with:
      operation: plan
      environments: ${{ github.event.inputs.environments || '' }}
      gitops_root: ${{ github.event.inputs.gitops_root || vars.STACKSMITH_GITOPS_ROOT || '.' }}
      discovery_mode: ${{ github.event.inputs.discovery_mode || vars.STACKSMITH_DISCOVERY_MODE || 'folders' }}
      workdir: ${{ vars.STACKSMITH_WORKDIR || '.' }}
      env_file: ${{ vars.STACKSMITH_ENV_FILE || '/dev/null' }}
      image_version: ${{ vars.STACKSMITH_IMAGE_VERSION || 'latest' }}
      plan_args: ${{ vars.STACKSMITH_PLAN_ARGS || '' }}
      validation_report_format: ${{ vars.STACKSMITH_VALIDATION_REPORT_FORMAT || 'json' }}
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME || '' }}
      upload_artifacts: true
      caller_event_name: ${{ github.event_name }}
      caller_base_ref: ${{ github.base_ref || '' }}
      caller_event_before: ${{ github.event.before || '' }}
      caller_sha: ${{ github.sha }}
    secrets: inherit
