name: stacksmith-plan

env:
  STACKSMITH_GITOPS_ROOT: ${{ vars.STACKSMITH_GITOPS_ROOT || 'examples/gitops-repo' }}

on:
  workflow_dispatch:
    inputs:
      environments:
        description: Comma-separated environment names. Leave empty for automatic selection.
        required: false
        type: string
      gitops_root:
        description: Relative path to the GitOps root folder.
        required: false
        type: string

permissions:
  contents: read

jobs:
  discover:
    name: discover-environments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      count: ${{ steps.select.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select target environments
        id: select
        env:
          INPUT_ENVIRONMENTS: "${{ github.event.inputs.environments || '' }}"
          INPUT_GITOPS_ROOT: "${{ github.event.inputs.gitops_root || '' }}"
          STACKSMITH_GITOPS_ROOT: "${{ env.STACKSMITH_GITOPS_ROOT }}"
          GITHUB_EVENT_NAME: "${{ github.event_name }}"
          GITHUB_BASE_REF: "${{ github.base_ref }}"
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          gitops_root = (
              os.getenv("INPUT_GITOPS_ROOT", "").strip()
              or os.getenv("STACKSMITH_GITOPS_ROOT", "").strip()
              or "examples/gitops-repo"
          ).strip("/")
          if gitops_root.startswith("./"):
              gitops_root = gitops_root[2:]

          env_root = pathlib.Path(gitops_root) / "environments"
          all_envs = []
          if env_root.exists():
              for env_dir in sorted(env_root.iterdir()):
                  if (env_dir / "stacksmith.yaml").exists():
                      all_envs.append(env_dir.name)

          manual = os.getenv("INPUT_ENVIRONMENTS", "").strip()
          selected = set()

          if manual:
              selected = {item.strip() for item in manual.split(",") if item.strip()}
          elif os.getenv("GITHUB_EVENT_NAME") == "workflow_dispatch":
              selected = set(all_envs)
          else:
              base_ref = os.getenv("GITHUB_BASE_REF", "")
              if base_ref:
                  subprocess.run(
                      ["git", "fetch", "origin", base_ref, "--depth", "1"],
                      check=True,
                  )
                  diff_text = subprocess.check_output(
                      ["git", "diff", "--name-only", f"origin/{base_ref}...HEAD"],
                      text=True,
                  )
              else:
                  diff_text = ""

              changed_paths = [line.strip() for line in diff_text.splitlines() if line.strip()]
              env_prefix = f"{gitops_root}/environments/"
              common_prefixes = (
                  f"{gitops_root}/common/",
                  f"{gitops_root}/manifests/common/",
              )
              run_all = any(
                  path.startswith(common_prefixes)
                  for path in changed_paths
              )

              if run_all:
                  selected = set(all_envs)
              else:
                  for path in changed_paths:
                      if not path.startswith(env_prefix):
                          continue
                      parts = pathlib.Path(path).parts
                      env_index = len(pathlib.Path(gitops_root).parts)
                      if len(parts) > env_index + 1:
                          selected.add(parts[env_index + 1])

          selected = [env for env in all_envs if env in selected]
          matrix = [
              {
                  "environment": env,
                  "run_file": f"{gitops_root}/environments/{env}/stacksmith.yaml",
              }
              for env in selected
          ]

          output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps(matrix)}\n")
              handle.write(f"count={len(matrix)}\n")
          PY

  plan:
    name: plan
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ubuntu-latest
    concurrency:
      group: stacksmith-plan-${{ matrix.environment }}
      cancel-in-progress: false
    container:
      image: docker.io/cisourcerer/stacksmith:latest
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME || env.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN || env.DOCKERHUB_TOKEN }}
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Stacksmith plan
        run: |
          set -euo pipefail
          artifact_dir=".stacksmith-ci/${{ matrix.environment }}"
          mkdir -p "$artifact_dir"

          stacksmith plan \
              --env-file "/dev/null" \
              --run-file "${{ matrix.run_file }}" \
              --save-plan-json "$artifact_dir/plan.json" \
              --validation-report-format "json" \
              | tee "$artifact_dir/validation-report.json"

      - name: Summarize plan
        run: |
          {
              echo "## Stacksmith Plan"
              echo ""
              echo "- Environment: `${{ matrix.environment }}`"
              echo "- Run file: `${{ matrix.run_file }}`"
              echo "- Operation: `plan`"
              echo "- Report: `.stacksmith-ci/${{ matrix.environment }}/validation-report.json`"
          } >> "$GITHUB_STEP_SUMMARY"

  no-op:
    name: no-op
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ needs.discover.outputs.count == '0' }}
    steps:
      - name: Summary
        run: |
          {
              echo "## Stacksmith Plan"
              echo ""
              echo "No environment manifests were selected for this event."
          } >> "$GITHUB_STEP_SUMMARY"
