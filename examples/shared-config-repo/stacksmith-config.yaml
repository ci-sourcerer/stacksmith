backend:
  type: local
  path: .stacksmith-state
tofu:
  version: "1.11.6"
provider_mappings:
  aws:
    source:
      source: registry
      data:
        address: hashicorp/aws
        version: ">= 6.39, < 7.0"
    instances:
      default:
        config:
          data:
            region: us-east-1
      secondary:
        alias: secondary
        config:
          script:
            source: local
            data:
              path: scripts/providers/configure_aws_secondary_provider.py
var_validations:
  aws_region:
    script:
      source: local
      data:
        path: scripts/validations/validate_aws_region.py
  instance_type:
    script:
      source: local
      data:
        path: scripts/validations/validate_ec2_instance_type.py
  subnet_id:
    inline: |
      import re

      def validate(value, **context):
          return (
              "pass"
              if bool(re.fullmatch(r"subnet-[0-9a-f]{8,17}", str(value)))
              else "fail"
          )
  bucket_name:
    inline: |
      import re

      def validate(value, **context):
          return (
              "pass"
              if bool(re.fullmatch(r"[a-z0-9][a-z0-9-]{1,61}[a-z0-9]", value))
              else "fail"
          )
  ssh_ingress_cidrs:
    inline: |
      import ipaddress

      def validate(value, **context):
          if not isinstance(value, str) or not value.strip():
              return "fail"
          cidrs = [item.strip() for item in value.split(",") if item.strip()]
          if not cidrs:
              return "fail"
          try:
              for cidr in cidrs:
                  ipaddress.ip_network(cidr, strict=False)
          except ValueError:
              return "fail"
          return "pass"
plan_validations:
  ec2_requires_imdsv2:
    description: Ensure all EC2 instances require IMDSv2 tokens.
    rule:
      script:
        source: local
        data:
          path: scripts/validations/validate_ec2_requires_imdsv2.py
  ec2_t3_micro_warning:
    description: Warn when plans include t3.micro so teams can rightsize before production.
    rule:
      script:
        source: local
        data:
          path: scripts/validations/validate_ec2_t3_micro_warning.py
  s3_public_access_block_enabled:
    description: Ensure S3 public access block controls are enabled.
    rule:
      script:
        source: local
        data:
          path: scripts/validations/validate_s3_no_public_access.py
  s3_write_sy_is_scoped:
    description: Ensure any PutObject allow statements are principal and object scoped.
    rule:
      script:
        source: local
        data:
          path: scripts/validations/validate_s3_write_policy_scope.py
module_mappings:
  aws_s3_bucket:
    description: AWS S3 bucket
    source:
      source: git
      data:
        repo: https://github.com/terraform-aws-modules/terraform-aws-s3-bucket.git
        ref: "v5.12.0"
    auto_inject: true
    providers:
      aws: aws.secondary
    properties:
      bucket_name:
        mapped_to: bucket
        transform:
          script:
            source: local
            data:
              path: scripts/transforms/transform_bucket_name.py
      aws_region:
        mapped_to: region
      versioning_enabled:
        mapped_to: versioning
        transform:
          inline: |
            def transform(value, **context):
                normalized = value
                if isinstance(normalized, str):
                    normalized = normalized.strip().lower() in {"1", "true", "yes", "on"}
                return {"enabled": bool(normalized)}
      lifecycle_rules:
        mapped_to: lifecycle_rule
        transform:
          script:
            source: local
            data:
              path: scripts/transforms/transform_lifecycle_rules.py
      writer_principal_arn:
        mapped_to: policy
        transform:
          script:
            source: local
            data:
              path: scripts/transforms/transform_s3_write_policy.py
      tags:
        transform:
          script:
            source: local
            data:
              path: scripts/transforms/transform_tags.py
  aws_ec2_instance:
    description: AWS EC2 instance
    source:
      source: git
      data:
        repo: https://github.com/terraform-aws-modules/terraform-aws-ec2-instance.git
        ref: "v6.4.0"
    auto_inject: true
    properties:
      name:
        transform:
          inline: |
            def transform(value, **context):
                inputs = context.get("inputs") or {}
                base = str(value).strip().lower().replace("_", "-")
                environment = str(inputs.get("environment", "dev")).strip().lower()
                return base if base.startswith(f"{environment}-") else f"{environment}-{base}"
      aws_region:
        mapped_to: region
      ssh_ingress_cidrs:
        mapped_to: security_group_ingress_rules
        transform:
          script:
            source: local
            data:
              path: scripts/transforms/transform_security_group_ingress_rules.py
      tags:
        transform:
          script:
            source: local
            data:
              path: scripts/transforms/transform_tags.py
  aws_iam_role:
    description: AWS IAM role
    source:
      source: git
      data:
        repo: https://github.com/terraform-aws-modules/terraform-aws-iam.git
        path: modules/iam-role
        ref: "v6.6.0"
    auto_inject: true
    properties:
      name:
        transform:
          inline: |
            def transform(value, **context):
                inputs = context.get("inputs") or {}
                base = str(value).strip().lower().replace("_", "-")
                environment = str(inputs.get("environment", "dev")).strip().lower()
                return base if base.startswith(f"{environment}-") else f"{environment}-{base}"
      tags:
        transform:
          script:
            source: local
            data:
              path: scripts/transforms/transform_tags.py
