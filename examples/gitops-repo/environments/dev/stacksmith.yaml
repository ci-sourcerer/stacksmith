# NOTE: In GitOps usage these `stacks`, `configs`, and `vars` are commonly
# sourced from separate repositories (for example a shared-config repo or a
# repo that holds manifests for each environment). This example keeps local
# relative paths so it works when checked out together, but in production you
# would reference remote repositories. Example structured git reference:
#
#   source: git
#   data:
#     repo: https://github.com/ci-sourcerer/stacksmith.git
#     path: examples/gitops-repo/manifests/environments/dev/service.stack.yaml
#     ref: main
#
# Keep the local paths here for demonstration and local testing.
merge_mode: deep
stacks:
  - source: local
    data:
      path: examples/gitops-repo/manifests/common/platform-base.stack.yaml
  - source: local
    data:
      path: examples/gitops-repo/manifests/common/platform-tags.stack.yaml
  - source: local
    data:
      path: examples/gitops-repo/manifests/environments/dev/service.stack.yaml
configs:
  - source: local
    data:
      path: examples/shared-config-repo/stacksmith-config.yaml
vars:
  - source: local
    data:
      path: examples/stack-repo/bucket-and-ec2/vars.dev.yaml
var:
  environment: dev
